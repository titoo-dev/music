services:
  postgres:
    image: postgres:17-alpine
    container_name: Deemix-Postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-deemix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-deemix}
      POSTGRES_DB: ${POSTGRES_DB:-deemix}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-deemix}"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: Deemix-MinIO
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    env_file: .env
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5

  createbucket:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    env_file: .env
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing myminio/$${MINIO_BUCKET:-deemix-music};
      exit 0;
      "

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-deemix}:${POSTGRES_PASSWORD:-deemix}@postgres:5432/${POSTGRES_DB:-deemix}
      - WS_BROADCAST_URL=http://ws:6595
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  ws:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "6595:6595"
    env_file: .env
    environment:
      - NODE_ENV=production
      - NEXT_URL=http://web:3000
    restart: unless-stopped

volumes:
  postgres-data:
  minio-data:
